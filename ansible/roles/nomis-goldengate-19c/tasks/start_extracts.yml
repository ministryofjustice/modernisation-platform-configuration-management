---
# Start GoldenGate Extract processes

- name: Start AUDITDATA Extract process
  ansible.builtin.shell: |
    set -e
    set -o pipefail
    export ORAENV_ASK=NO
    . oraenv > /dev/null
    cd {{ oracle_goldengate_scripts_dir }}
    ./ogg_control.sh start auditdata extract
  args:
    executable: /bin/bash
    chdir: "{{ oracle_goldengate_home }}"
  environment: "{{ gg_env | combine({'ORACLE_SID': oracle_goldengate_group.auditdata.tns_alias}) }}"
  become: yes
  become_user: "{{ oracle_goldengate_owner }}"
  register: start_auditdata_extract
  changed_when: "'RUNNING' in start_auditdata_extract.stdout"
  when: run_auditdata

