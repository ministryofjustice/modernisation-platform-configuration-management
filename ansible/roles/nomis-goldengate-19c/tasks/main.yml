    - unregister-mis-extract

# Register Extract processes
- name: Register MIS Extract processes
  import_tasks: register_mis_extract.yml
  when: run_mis
  tags:
    - goldengate
    - goldengate-config
    - goldengate-processes
    - goldengate-mis
    - goldengate-extract
    - register-extracts
    - register-mis-extract

- name: Install GoldenGate replicat processes (MIS database)
  import_tasks: install_mis_replicat.yml
  when: run_mis
  tags:
    - goldengate
    - goldengate-config
    - goldengate-processes
    - goldengate-mis
    - goldengate-replicat
    - install-replicats
    - install-mis-replicat

- name: Unregister MIS Replicat processes
  import_tasks: unregister_mis_replicat.yml
  when: run_mis
  tags:
    - goldengate
    - goldengate-config
    - goldengate-processes
    - goldengate-mis
    - goldengate-replicat
    - unregister-replicats
    - unregister-mis-replicat

- name: Register MIS Replicat process
  import_tasks: register_mis_replicat.yml
  when: run_mis
  tags:
    - goldengate
    - goldengate-config
    - goldengate-processes
