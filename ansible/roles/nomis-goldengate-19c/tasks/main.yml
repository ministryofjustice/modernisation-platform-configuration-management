# Control scripts (deploy on all hosts)
- name: Deploy GoldenGate control scripts
  import_tasks: deploy_control_scripts.yml
  tags:
    - goldengate
    - goldengate-config
    - goldengate-scripts
    - goldengate-audit
    - goldengate-mis
    - deploy-scripts

# Process management tasks
- name: Start GoldenGate Extract processes
  import_tasks: start_extracts.yml
  tags:
    - goldengate
    - goldengate-start
    - start-extracts
    - never

- name: Stop GoldenGate Extract processes
  import_tasks: stop_extracts.yml
  tags:
    - goldengate
    - goldengate-stop
    - stop-extracts
    - never

- name: Start GoldenGate Replicat processes
  import_tasks: start_replicats.yml
  tags:
    - goldengate
    - goldengate-start
    - start-replicats
    - never

- name: Stop GoldenGate Replicat processes
  import_tasks: stop_replicats.yml
  tags:
    - goldengate
    - goldengate-stop
    - stop-replicats
    - never


# Helper tasks
- name: Get current SCN from databases
  import_tasks: get_current_scn.yml
  tags:
    - goldengate
    - goldengate-info
    - get-current-scn
    - never
