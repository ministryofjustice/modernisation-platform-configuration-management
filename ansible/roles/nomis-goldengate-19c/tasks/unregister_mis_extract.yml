---
# Unregister and manage MIS Extract process
- name: Unregister MIS Extract process
  when: run_mis
  block:
    # stop the extract process then unregister it from the database
    - name: Stop MIS Extract process
      ansible.builtin.shell: |
        set -e
        set -o pipefail
        export ORAENV_ASK=NO
        . oraenv > /dev/null
        cd {{ oracle_goldengate_scripts_dir }}
        ./ogg_control.sh stop mis extract
      args:
        executable: /bin/bash
        chdir: "{{ oracle_goldengate_home }}"
      environment: "{{ gg_env | combine({'ORACLE_SID': oracle_goldengate_group.mis.tns_alias}) }}"
      become: yes
      become_user: "{{ oracle_goldengate_owner }}"
      register: stop_mis_extract
      failed_when: false

    - name: Unregister MIS Extract process
      ansible.builtin.shell: |
        set -e
        set -o pipefail
        export ORAENV_ASK=NO
        . oraenv > /dev/null
        ./ggsci << EOF
        dblogin useridalias {{ oracle_goldengate_group.source.credential_alias }}
        MININGDBLOGIN USERIDALIAS {{ oracle_goldengate_group.mis.credential_alias }}
        STOP EXTRACT {{ oracle_goldengate_group.mis.extract_name }}
        UNREGISTER EXTRACT {{ oracle_goldengate_group.mis.extract_name }} DATABASE
        DELETE EXTRACT {{ oracle_goldengate_group.mis.extract_name }}
        EXIT
        EOF
      args:
        executable: /bin/bash
        chdir: "{{ oracle_goldengate_home }}"
      environment: "{{ gg_env | combine({'ORACLE_SID': oracle_goldengate_group.mis.tns_alias}) }}"
      become: yes
      become_user: "{{ oracle_goldengate_owner }}"
      register: remove_mis_extract
      failed_when: false

    - name: Display stdout for MIS Extract unregistration
      ansible.builtin.debug:
        msg: "{{ remove_mis_extract.stdout }}"
