---
# Unregister and manage MIS Replicat process

- name: Delete MIS Replicat process
  ansible.builtin.shell: |
    set -e
    set -o pipefail
    export ORAENV_ASK=NO
    . oraenv > /dev/null
    ./ggsci << EOF
    dblogin useridalias {{ oracle_goldengate_group.mis.credential_alias }}
    STOP REPLICAT {{ oracle_goldengate_group.mis.replicat_name }}
    DELETE REPLICAT {{ oracle_goldengate_group.mis.replicat_name }}
    EXIT
    EOF
  args:
    executable: /bin/bash
    chdir: "{{ oracle_goldengate_home }}"
  environment: "{{ gg_env | combine({'ORACLE_SID': oracle_goldengate_group.mis.tns_alias}) }}"
  become: yes
  become_user: "{{ oracle_goldengate_owner }}"
  register: delete_mis_replicat
  failed_when: '"ERROR" in delete_mis_replicat.stdout and "does not exist" not in delete_mis_replicat.stdout'
  changed_when: '"Deleted" in delete_mis_replicat.stdout'
  when: run_mis

- name: Display stdout for MIS Replicat unregistration
  ansible.builtin.debug:
    msg: "{{ delete_mis_replicat.stdout }}"
  when: run_mis

