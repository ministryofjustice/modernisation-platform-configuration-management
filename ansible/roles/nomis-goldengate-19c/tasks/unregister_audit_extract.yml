---
# Unregister and manage AUDITDATA Extract process
- name: Unregister AUDITDATA Extract process
  when: run_auditdata
  block:
    # stop the extract process then unregister it from the database
    - name: Stop AUDITDATA Extract process
      ansible.builtin.shell: |
        set -e
        set -o pipefail
        export ORAENV_ASK=NO
        . oraenv > /dev/null
        cd {{ oracle_goldengate_scripts_dir }}
        ./ogg_control.sh stop auditdata extract
      args:
        executable: /bin/bash
        chdir: "{{ oracle_goldengate_home }}"
      environment: "{{ gg_env | combine({'ORACLE_SID': oracle_goldengate_group.auditdata.tns_alias}) }}"
      become: yes
      become_user: "{{ oracle_goldengate_owner }}"
      register: stop_auditdata_extract
      failed_when: false

    - name: Unregister AUDITDATA Extract process
      ansible.builtin.shell: |
        set -e
        set -o pipefail
        export ORAENV_ASK=NO
        . oraenv > /dev/null
        ./ggsci << EOF
        dblogin useridalias {{ oracle_goldengate_group.source.credential_alias }}
        MININGDBLOGIN USERIDALIAS {{ oracle_goldengate_group.auditdata.credential_alias }}
        STOP EXTRACT {{ oracle_goldengate_group.auditdata.extract_name }}
        UNREGISTER EXTRACT {{ oracle_goldengate_group.auditdata.extract_name }} DATABASE
        DELETE EXTRACT {{ oracle_goldengate_group.auditdata.extract_name }}
        EXIT
        EOF
      args:
        executable: /bin/bash
        chdir: "{{ oracle_goldengate_home }}"
      environment: "{{ gg_env | combine({'ORACLE_SID': oracle_goldengate_group.auditdata.tns_alias}) }}"
      become: yes
      become_user: "{{ oracle_goldengate_owner }}"
      register: remove_auditdata_extract
      failed_when: false

    - name: Display stdout for AuditData Extract unregistration
      ansible.builtin.debug:
        msg: "{{ remove_auditdata_extract.stdout }}"

