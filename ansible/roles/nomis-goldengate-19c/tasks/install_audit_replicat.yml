---
# Deploy Replicat parameter files based on which database is local
- name: Deploy Replicat parameter file for AUDITDATA
  ansible.builtin.template:
    src: replicat_auditdata.prm.j2
    dest: "{{ oracle_goldengate_param_dir }}/{{ oracle_goldengate_group.auditdata.replicat_name }}.prm"
    owner: "{{ oracle_goldengate_owner }}"
    group: "{{ oracle_goldengate_osgroup }}"
    mode: "0644"

- name: Deploy Replicat parameter file for AUDITREF
  ansible.builtin.template:
    src: replicat_auditref.prm.j2
    dest: "{{ oracle_goldengate_param_dir }}/{{ oracle_goldengate_group.auditref.replicat_name }}.prm"
    owner: "{{ oracle_goldengate_owner }}"
    group: "{{ oracle_goldengate_osgroup }}"
    mode: "0644"

# call task add_checkpointtable.yml to create the checkpoint table used by the replicat processes. We need to create it after deploying the parameter files because the parameter files specify the name of the checkpoint table, and it needs to exist before we can start the processes.
# Pass in the tns_alias as var checkpoint_table_db_alias
- name: Create checkpoint table for replicat processes
  import_tasks: add_checkpointtable.yml
  vars:
    checkpoint_table_db_alias: "{{ oracle_goldengate_group.auditdata.credential_alias }}"
