---
# Stop GoldenGate Extract processes

- name: Stop AUDITDATA Extract process
  ansible.builtin.shell: |
    set -e
    set -o pipefail
    export ORAENV_ASK=NO
    . oraenv > /dev/null
    cd {{ oracle_goldengate_scripts_dir }}
    ./ogg_control.sh stop auditdata extract
  args:
    executable: /bin/bash
    chdir: "{{ oracle_goldengate_home }}"
  environment: "{{ gg_env | combine({'ORACLE_SID': oracle_goldengate_group.auditdata.tns_alias}) }}"
  become: yes
  become_user: "{{ oracle_goldengate_owner }}"
  register: stop_auditdata_extract
  changed_when: "'STOPPED' in stop_auditdata_extract.stdout or 'ABENDED' in stop_auditdata_extract.stdout"
  when: run_auditdata

