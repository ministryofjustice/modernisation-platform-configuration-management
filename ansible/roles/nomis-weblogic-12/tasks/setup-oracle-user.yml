---
- name: Check oracle user already exists
  ansible.builtin.getent:
    database: passwd
    key: oracle

- name: Create oracle user directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: "0755"
  loop:
    - /home/oracle/admin/scripts

- name: Copy oracle user bash profile
  ansible.builtin.template:
    src: "12{{ item }}"
    dest: "{{ item }}"
    owner: oracle
    group: oinstall
  loop:
    - /home/oracle/.bash_profile

- name: Copy oracle user scripts
  ansible.builtin.template:
    src: "12{{ item }}"
    dest: "{{ item }}"
    owner: oracle
    group: oinstall
    mode: '0755'
  loop:
    - /home/oracle/admin/scripts/wait_for_entry_in_journal.sh
    - /home/oracle/admin/scripts/startWebLogic.sh
    - /home/oracle/admin/scripts/startManagedWebLogic.sh
    - /home/oracle/admin/scripts/startNodeManager.sh
    - /home/oracle/admin/scripts/startOHS.sh
    - /home/oracle/admin/scripts/startOHS.py
    - /home/oracle/admin/scripts/stopWebLogic.sh
    - /home/oracle/admin/scripts/stopManagedWebLogic.sh
    - /home/oracle/admin/scripts/stopNodeManager.sh
    - /home/oracle/admin/scripts/stopOHS.sh
    - /home/oracle/admin/scripts/stopOHS.py
    - /home/oracle/admin/scripts/start_WLS_SERVICE.sh
    - /home/oracle/admin/scripts/startNomisReportsServer.sh
    - /home/oracle/admin/scripts/stopNomisReportsServer.sh

- name: Add oracle user limits
  community.general.pam_limits:
    domain: oracle
    limit_type: "{{ item.limit_type }}"
    limit_item: "{{ item.limit_item }}"
    value: "{{ item.value }}"
  loop:
    - { limit_type: "soft", limit_item: "memlock", value: 1048576 }
    - { limit_type: "hard", limit_item: "memlock", value: 1048576 }
    - { limit_type: "soft", limit_item: "nofile", value: 262144 }
    - { limit_type: "hard", limit_item: "nofile", value: 262144 }
    - { limit_type: "soft", limit_item: "nproc", value: 30114 }
    - { limit_type: "hard", limit_item: "nproc", value: 30114 }
    - { limit_type: "soft", limit_item: "stack", value: 10240 }
    - { limit_type: "hard", limit_item: "stack", value: 10240 }