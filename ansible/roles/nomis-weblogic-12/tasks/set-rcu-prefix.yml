- name: Ensure WebLogic software directory exists
  ansible.builtin.file:
    path: /u01/software/weblogic
    state: directory
    owner: oracle
    group: oinstall
    mode: "0755"

- name: Check for existing local RCU prefix marker
  ansible.builtin.stat:
    path: /u01/software/weblogic/.rcu_prefix
  register: weblogic_rcu_prefix_marker

- name: Read existing local RCU prefix marker
  ansible.builtin.slurp:
    path: /u01/software/weblogic/.rcu_prefix
  register: weblogic_rcu_prefix_marker_content
  when: weblogic_rcu_prefix_marker.stat.exists

- name: Use existing local RCU prefix marker if present
  ansible.builtin.set_fact:
    weblogic_db_repo_prefix: "{{ weblogic_rcu_prefix_marker_content.content | b64decode | trim }}"
  when: weblogic_rcu_prefix_marker.stat.exists

- name: Persist local RCU prefix marker
  ansible.builtin.copy:
    content: "{{ weblogic_db_repo_prefix }}\n"
    dest: /u01/software/weblogic/.rcu_prefix
    owner: oracle
    group: oinstall
    mode: "0600"
    force: false
  when: not weblogic_rcu_prefix_marker.stat.exists
