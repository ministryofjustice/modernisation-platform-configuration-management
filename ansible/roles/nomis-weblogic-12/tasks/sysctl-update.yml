---
- name: Add or update system config changes for nomis weblogic performance
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { name: "fs.aio-max-nr", value: "1048576" }
    - { name: "fs.file-max", value: "6815744" }
    - { name: "kernel.shmmax", value: "4398046511104" }
