---
- name: Check if weblogic domain already installed
  ansible.builtin.stat:
    path: "{{ weblogic_domain_home }}"
  register: weblogic_domain_installed_check

- name: Check Oracle supplied domain templates exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ weblogic_allowed_domain_templates }}"
  register: weblogic_domain_template_stats

- name: Fail if required Oracle supplied templates are missing
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Required Oracle supplied WebLogic template is missing: {{ item.item }}"
  loop: "{{ weblogic_domain_template_stats.results }}"

- name: Fail if a forbidden Coherence template is configured
  ansible.builtin.assert:
    that:
      - weblogic_allowed_domain_templates
        | select('search', '(?i)coherence')
        | list
        | length == 0
    fail_msg: "Coherence template detected in weblogic_allowed_domain_templates. Remove it for WLS Basic compliance."

- name: Create weblogic domain directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: "0755"
  loop:
    - /u01/software/domain
    - /home/oracle/admin/scripts
  when: not weblogic_domain_installed_check.stat.exists

- name: Fail if RCU repository details are not configured
  ansible.builtin.assert:
    that:
      - weblogic_db_repo_hostname is defined
      - weblogic_db_repo_hostname | length > 0
      - weblogic_db_repo_sid is defined
      - weblogic_db_repo_sid | length > 0
      - weblogic_db_repo_prefix is defined
      - weblogic_db_repo_prefix | length > 0
      - weblogic_db_repo_schema_password is defined
      - weblogic_db_repo_schema_password | length > 0
    fail_msg: >-
      RCU repository details are required before creating the WebLogic
      Forms and Reports domain. Ensure create-db-repo.yml has run and
      weblogic_db_repo_hostname, weblogic_db_repo_sid, weblogic_db_repo_prefix,
      and weblogic_db_repo_schema_password are set.

# if weblogic_is_first_domain is not defined, default to true for backward compatibility
- name: Set weblogic_is_first_domain fact if not defined
  ansible.builtin.set_fact:
    weblogic_is_first_domain: true
  when: weblogic_is_first_domain is not defined
  
- name: Debug first-domain logic
  ansible.builtin.debug:
    msg: "weblogic_is_first_domain = {{ weblogic_is_first_domain }}"

# debug msg output of weblogic_db_repo_prefix
- name: Debug RCU prefix
  ansible.builtin.debug:
    msg: "Using RCU prefix '{{ weblogic_db_repo_prefix }}' for WebLogic domain"

- name: Copy WLST domain creation script
  ansible.builtin.template:
    src: "12/home/oracle/admin/scripts/create_forms_reports_domain.py.j2"
    dest: "/home/oracle/admin/scripts/create_forms_reports_domain.py"
    owner: oracle
    group: oinstall
    mode: "0700"
  when: not weblogic_domain_installed_check.stat.exists

- name: Create WebLogic Forms and Reports domain using WLST offline
  become_user: oracle
  ansible.builtin.shell: |
    set -eo pipefail
    {{ weblogic_oracle_home }}/oracle_common/common/bin/wlst.sh \
      /home/oracle/admin/scripts/create_forms_reports_domain.py > /home/oracle/admin/scripts/create_forms_reports_domain.log 2>&1
  args:
    executable: /bin/bash
  register: create_weblogic_domain_result
  changed_when: true
  when: not weblogic_domain_installed_check.stat.exists

- name: Remove /home/oracle/admin/scripts/create_forms_reports_domain.py
  ansible.builtin.file:
    path: /home/oracle/admin/scripts/create_forms_reports_domain.py
    state: absent


