---
- name: Check existing domain RCU prefix marker
  ansible.builtin.stat:
    path: /u01/software/weblogic/.rcu_prefix
  register: weblogic_existing_rcu_prefix_marker

- name: Read existing domain RCU prefix marker
  ansible.builtin.slurp:
    path: /u01/software/weblogic/.rcu_prefix
  register: weblogic_existing_rcu_prefix_marker_content
  when: weblogic_existing_rcu_prefix_marker.stat.exists

- name: Fail if requested RCU prefix differs from existing local marker
  ansible.builtin.assert:
    that:
      - weblogic_db_repo_prefix == (weblogic_existing_rcu_prefix_marker_content.content | b64decode | trim)
    fail_msg: >-
      Refusing to change RCU prefix for this WebLogic instance.
      Existing prefix is {{ weblogic_existing_rcu_prefix_marker_content.content | b64decode | trim }},
      requested prefix is {{ weblogic_db_repo_prefix }}.
  when: weblogic_existing_rcu_prefix_marker.stat.exists

- name: Copy repository database config
  ansible.builtin.template:
    src: "12{{ item }}"
    dest: "{{ item }}"
    owner: oracle
    group: oinstall
    mode: '0600'
  loop:
    - /u01/software/weblogic/rcu.rsp

# ✅ Check if RCU schemas exist (more robust check)
- name: Check whether RCU schemas already exist
  become_user: oracle
  ansible.builtin.shell: |
    set -eo pipefail
    source ~oracle/.bash_profile
    sqlplus -s /nolog <<'SQL'
    connect sys/{{ weblogic_db_repo_password }}@{{ weblogic_db_repo_hostname }}:1521/{{ weblogic_db_repo_sid }} as sysdba
    set heading off feedback off verify off echo off pagesize 0
    select count(*)
    from dba_users
    where username in (
      upper('{{ weblogic_db_repo_prefix }}_STB'),
      upper('{{ weblogic_db_repo_prefix }}_OPSS'),
      upper('{{ weblogic_db_repo_prefix }}_MDS')
    );
    exit
    SQL
  args:
    executable: /bin/bash
  register: rcu_schema_check
  changed_when: false
  no_log: true

- name: Set RCU repository exists fact
  ansible.builtin.set_fact:
    weblogic_rcu_repository_exists: "{{ (rcu_schema_check.stdout | trim | int) >= 3 }}"

# ✅ Run RCU ONLY if schemas missing AND lock acquired
- name: Create repository database using rcu
  become_user: oracle
  ansible.builtin.expect:
    command: '/u01/app/oracle/Middleware/oracle_common/bin/rcu -silent -responseFile /u01/software/weblogic/rcu.rsp'
    responses:
      "Enter the database password":
        - "{{ weblogic_db_repo_password }}"
      "Enter the schema password":
        - "{{ weblogic_db_repo_schema_password }}"
    timeout: 600
  register: create_db_repo
  when:
    - not weblogic_rcu_repository_exists

# ✅ Check if RCU schemas exist (more robust check)
- name: Check whether RCU schemas now exist
  become_user: oracle
  ansible.builtin.shell: |
    set -eo pipefail
    source ~oracle/.bash_profile
    sqlplus -s /nolog <<'SQL'
    connect sys/{{ weblogic_db_repo_password }}@{{ weblogic_db_repo_hostname }}:1521/{{ weblogic_db_repo_sid }} as sysdba
    set heading off feedback off verify off echo off pagesize 0
    select count(*)
    from dba_users
    where username in (
      upper('{{ weblogic_db_repo_prefix }}_STB'),
      upper('{{ weblogic_db_repo_prefix }}_OPSS'),
      upper('{{ weblogic_db_repo_prefix }}_MDS')
    );
    exit
    SQL
  args:
    executable: /bin/bash
  register: rcu_schema_check
  changed_when: false
  no_log: true

# ✅ Final safety check
- name: Fail if RCU schemas still not present
  ansible.builtin.fail:
    msg: >
      RCU schemas for prefix {{ weblogic_db_repo_prefix }} were not found
      after attempted creation. Deployment cannot continue.
  when:
    - (rcu_schema_check.stdout | default('0') | trim | int) == 0

- name: Set fact to indicate if this is the first domain using the schemas
  ansible.builtin.set_fact:
    weblogic_is_first_domain: "{{ not weblogic_rcu_repository_exists }}"