oracle_template_file_config:
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/ssl.conf
    dest: /u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/instances/ohs1/ssl.conf
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/ssl.conf
    dest: /u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/ohs1/ssl.conf
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/httpd.conf
    dest: /u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/ohs1/httpd.conf
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/httpd.conf
    dest: /u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/instances/ohs1/httpd.conf
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/mod_wl_ohs.conf
    dest: /u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/ohs1/mod_wl_ohs.conf
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/mod_wl_ohs.conf
    dest: /u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/instances/ohs1/mod_wl_ohs.conf
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/forms.conf
    dest: /u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/instances/ohs1/moduleconf/forms.conf
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/OHS/forms.conf
    dest: /u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/FORMS/forms1/server/forms.conf
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/tnsnames.ora
    dest: /u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/tnsnames.ora
  - src: 12/u01/app/oracle/Middleware/user_projects/domains/nomis/config/fmwconfig/components/tnsnames.ora
    dest: /u01/app/oracle/Middleware/network/admin/tnsnames.ora
  - src: 12/u01/tag/utils/scripts/compile_all_forms.sh
    dest: /u01/tag/utils/scripts/compile_all_forms.sh

tagsar_sql_file_paths:
  - /u01/tag/tagsar/tagsar_dbobjects/STOP_TAGSAR_QUEUE.sql
  - /u01/tag/tagsar/tagsar_dbobjects/DROP_TAGSAR_Q_TABLE.sql
  - /u01/tag/tagsar/tagsar_dbobjects/CR_TAGSAR_Q_TABLE.sql
  - /u01/tag/tagsar/tagsar_dbobjects/CR_TAGSAR_Q.sql
  - /u01/tag/tagsar/tagsar_dbobjects/TAG_SYSTEM_REPORT.pkg
  - /u01/tag/tagsar/tagsar_dbobjects/START_TAGSAR_QUEUE.sql

db_config: "{{ db_configs[weblogic_db_name] }}"
reports_server_name: rep_server1
weblogic_ohs_component_name: ohs1
weblogic_ohs_listen_port: 7777
weblogic_ohs_ssl_port: 4443
weblogic_admin_username: weblogic
weblogic_db_name: "{{ ec2.tags['oracle-db-name'] }}"
weblogic_db_hostname_a: "{{ ec2.tags['oracle-db-hostname-a'] }}"
weblogic_db_hostname_b: "{{ ec2.tags['oracle-db-hostname-b'] }}"
weblogic_db_tagsar_username: TAGSAR
weblogic_db_username: oms_owner
weblogic_domain_hostname: "{{ ansible_facts.hostname }}"

# Set these in appropriate group vars:
# weblogic_db_repo_hostname:
# weblogic_db_repo_sid:
# Shared RCU configuration (must be identical across all EC2s)
weblogic_db_repo_prefix: NOMISWLS
weblogic_db_repo_username: "sys"

weblogic_db_repo_password_secret:
  - key: "{{ weblogic_db_repo_username }}"
    value:

weblogic_admin_password_secret:
  - key: "{{ weblogic_admin_username }}"
    value: auto

#weblogic_other_form_servers:
#  - { name: WLS_FORMS }
#  - { name: WLS_REPORTS }
#  - { name: AdminServer }
#  - { name: WLS_AUTOLOGOFF }
#  - { name: WLS_TAGSAR }
#  - { name: WLS_HOTPAGE }

weblogic_secretsmanager_passwords:
  db:
    secret: "/oracle/database/{{ db_config.db_name }}/weblogic-passwords"
    users:
      - TAGSAR:
      - oms_owner:
  db_repo:
    secret: "/oracle/database/{{ weblogic_db_repo_sid }}/weblogic-passwords"
    users:
      - "{{ weblogic_db_repo_password_secret | items2dict }}"
      - wls_schemas: auto
  weblogic:
    secret: "/oracle/weblogic/{{ nomis_environment }}/passwords"
    users:
      - "{{ weblogic_admin_password_secret | items2dict }}"

weblogic_domain_name: nomis
weblogic_domain_home: /u01/app/oracle/Middleware/user_projects/domains/{{ weblogic_domain_name }}
weblogic_oracle_home: /u01/app/oracle/Middleware
weblogic_db_repo_url: "jdbc:oracle:thin:@//{{ weblogic_db_repo_hostname }}:1521/{{ weblogic_db_repo_sid | upper }}"
weblogic_admin_server_name: AdminServer
weblogic_admin_listen_port: 7001
weblogic_admin_listen_address: "" # Listen on all interfaces

weblogic_common_jvm_args:
  - "-XX:+CrashOnOutOfMemoryError"

weblogic_domain_servers:
  - name: AdminServer
    listen_address: "" # Listen on all interfaces
    listen_port: 7001
    cluster: ""
    jvm_args: "-Xms512m -Xmx1024m -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m {{ weblogic_common_jvm_args }}"
  - name: WLS_FORMS
    listen_address: "" # Listen on all interfaces
    listen_port: 9001
    cluster: cluster_forms
    jvm_args: "-Xms1024m -Xmx1536m -XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=512m {{ weblogic_common_jvm_args }}"
  - name: WLS_REPORTS
    listen_address: "" # Listen on all interfaces
    listen_port: 9002
    cluster: cluster_reports
    jvm_args: "-Xms1024m -Xmx1536m -XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=512m {{ weblogic_common_jvm_args }}"

weblogic_domain_clusters:
  - cluster_forms
  - cluster_reports

weblogic_allowed_domain_templates:
  - "{{ weblogic_oracle_home }}/wlserver/common/templates/wls/wls.jar"
  - "{{ weblogic_oracle_home }}/oracle_common/common/templates/wls/oracle.jrf_template.jar"
  - "{{ weblogic_oracle_home }}/forms/common/templates/wls/forms_template.jar"
  - "{{ weblogic_oracle_home }}/ReportsServerComponent/common/templates/wls/oracle.reports_server_template.jar"
  - "{{ weblogic_oracle_home }}/reports/common/templates/wls/oracle.reports_app_template.jar"
  - "{{ weblogic_oracle_home }}/ohs/common/templates/wls/ohs_managed_template.jar"

weblogic_forbidden_template_patterns:
  - coherence
  - oracle.coherence