osbws_additional_configs:
  - name: osbws_prod
    s3_bucket_name: nomis-db-backup-bucket20220427111226918600000001

REFRESH_DB:
  PPCNOM:
    azure_storage: https://strpdnomsazcopyorabkup.blob.core.windows.net/pdpdl00035-cnomp
    azure_backup_directory: /u03/backup/rman
    cron: 
      - name: azcopy backup restore 
        weekday: "0"
        minute: "00"
        hour: "08"
      - name: preprod database refresh 
        weekday: "0"
        minute: "00"
        hour: "11"
    files:
      - azcopy_backup_restore.sh
      - initPPCNOM.ora
      - PPCNOM_post_refresh_steps.sh
      - db_refresh.sh
    
  PPMIS:
    azure_storage: https://strpdnomsazcopyorabkup.blob.core.windows.net/pdpdl00036-misp
    azure_backup_directory: /u03/backup/rman
    cron: 
      - name: azure backup restore 
        weekday: "0"
        minute: "00"
        hour: "07"
      - name: preprod database refresh 
        weekday: "0"
        minute: "00"
        hour: "13"
    files:
      - azcopy_backup_restore.sh
      - initPPMIS.ora
      - PPMIS_post_refresh_steps.sh
      - db_refresh.sh
